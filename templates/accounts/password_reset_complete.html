<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - CodeFun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: { 400: '#fb923c', 500: '#f97316', 600: '#ea580c' },
                    dark: { 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
            }
        }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-dark-950 font-sans min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="{% url 'login' %}" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-amber-400 rounded-xl flex items-center justify-center">
                    <span class="text-white font-bold text-lg">&lt;/&gt;</span>
                </div>
                <span class="text-xl font-bold text-white">Code<span class="text-primary-500">Fun</span></span>
            </a>
        </div>

        <div class="bg-dark-800/60 backdrop-blur rounded-2xl border border-dark-700 p-8 text-center">
            <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-emerald-500/10 flex items-center justify-center">
                <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2">Password Reset!</h1>
            <p class="text-sm text-gray-400 mb-6">Your password has been changed successfully. You can now log in with your new password.</p>
            <a href="{% url 'login' %}" class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-semibold rounded-xl transition-all duration-200 shadow-lg shadow-primary-500/20">
                Log In Now
            </a>
        </div>
    </div>
</body>
</html>
