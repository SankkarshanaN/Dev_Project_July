<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CodeFun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: { 400: '#fb923c', 500: '#f97316', 600: '#ea580c' },
                    dark: { 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
            }
        }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-dark-950 font-sans min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="{% url 'login' %}" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-amber-400 rounded-xl flex items-center justify-center">
                    <span class="text-white font-bold text-lg">&lt;/&gt;</span>
                </div>
                <span class="text-xl font-bold text-white">Code<span class="text-primary-500">Fun</span></span>
            </a>
        </div>

        <!-- Card -->
        <div class="bg-dark-800/60 backdrop-blur rounded-2xl border border-dark-700 p-8">
            <div class="text-center mb-6">
                <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-primary-500/10 flex items-center justify-center">
                    <svg class="w-7 h-7 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
                </div>
                <h1 class="text-2xl font-bold text-white mb-2">Reset Password</h1>
                <p class="text-sm text-gray-400">Enter your email and we'll send you a reset link</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-6">
                    <label for="id_email" class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                    <input type="email" name="email" id="id_email" required autofocus
                           placeholder="you@example.com"
                           class="w-full px-4 py-3 bg-dark-900/50 border border-dark-600 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-colors">
                </div>
                <button type="submit" class="w-full py-3 px-4 bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-semibold rounded-xl transition-all duration-200 shadow-lg shadow-primary-500/20 hover:shadow-primary-500/30">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="{% url 'login' %}" class="text-sm text-gray-400 hover:text-primary-400 transition-colors">
                    &larr; Back to login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
