<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent - CodeFun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: { 400: '#fb923c', 500: '#f97316', 600: '#ea580c' },
                    dark: { 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
            }
        }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-dark-950 font-sans min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="{% url 'login' %}" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-amber-400 rounded-xl flex items-center justify-center">
                    <span class="text-white font-bold text-lg">&lt;/&gt;</span>
                </div>
                <span class="text-xl font-bold text-white">Code<span class="text-primary-500">Fun</span></span>
            </a>
        </div>

        <div class="bg-dark-800/60 backdrop-blur rounded-2xl border border-dark-700 p-8 text-center">
            <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-emerald-500/10 flex items-center justify-center">
                <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2">Check Your Email</h1>
            <p class="text-sm text-gray-400 mb-6">If an account exists with the email you entered, we've sent password reset instructions. Please check your inbox and spam folder.</p>
            <a href="{% url 'login' %}" class="inline-flex items-center gap-2 px-5 py-2.5 bg-dark-700 hover:bg-dark-600 text-gray-300 text-sm font-medium rounded-lg border border-dark-600 transition-colors">
                &larr; Back to Login
            </a>
        </div>
    </div>
</body>
</html>
