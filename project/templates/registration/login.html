{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'members/css/style.css' %}">
</head>
<body>
    <div class="container">
        <h2>🔐 Login</h2>
        {% if form.errors %}
            <p style="color:red;">Invalid login credentials. Please try again.</p>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="{% url 'accounts:register' %}">Register here</a>
</p>
    </div>
</body>
</html>
